name: Deploy Scraper n8n

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Instalar dependencias
        run: yarn install --frozen-lockfile

      - name: Ejecutar Build
        run: node build.js 

      - name: Preparar limpieza pre-vuelo
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            # 1. Detener el bot para liberar archivos bloqueados
            pm2 stop scraper-n8n || true
            # 2. Limpiar archivos viejos PERO mantener las carpetas de datos
            cd /www/wwwroot/scraper-n8n
            find . -maxdepth 1 ! -name 'reportes' ! -name 'public-reports' ! -name 'pdf-images' ! -name '.chrome-data' ! -name 'logs' ! -name '.' -exec rm -rf {} +

      - name: Desplegar archivos limpios
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          # Subimos solo lo esencial para que no haya basura de .git
          source: "src/,dist/,index.js,package.json,ecosystem.config.js,yarn.lock,build.js"
          target: "/www/wwwroot/scraper-n8n"
          overwrite: true
          strip_components: 0

      - name: Post-Despliegue y Arranque
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /www/wwwroot/scraper-n8n
            yarn install --production
            # Asegurar carpetas de trabajo
            mkdir -p logs reportes public-reports pdf-images
            # Iniciar de nuevo
            pm2 startOrRestart ecosystem.config.js
            pm2 save