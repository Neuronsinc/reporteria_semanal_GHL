name: Deploy Scraper n8n

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Instalar dependencias
        run: yarn install --frozen-lockfile

      - name: Ejecutar Build
        # Esto genera la carpeta dist/ localmente en el corredor de GitHub
        run: node build.js 

      - name: Asegurar package.json en dist
        run: cp package.json dist/package.json

      - name: Desplegar TODO al servidor
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "./*" 
          target: "/www/wwwroot/scraper-n8n"
          overwrite: true
          # EXCLUIR carpetas innecesarias y problemáticas
          rm: false
          strip_components: 0
          tar_tmp_path: "/tmp"
          # Agregamos el filtro de exclusión:
          filter: |
            ! .git/
            ! node_modules/
            ! .github/
            ! .chrome-data/
            ! .dist/
            ! .pdf-images/
            ! .publicl-reports/
            ! .reportes/

      - name: Post-Despliegue
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /www/wwwroot/scraper-n8n
            yarn install --production
            # Crea los logs si no existen para que PM2 no de error
            mkdir -p logs
            # Inicia o reinicia usando el archivo de configuración
            pm2 startOrRestart ecosystem.config.js
            pm2 save