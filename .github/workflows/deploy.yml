name: Deploy Scraper n8n

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Instalar dependencias
        run: yarn install --frozen-lockfile

      - name: Ejecutar Build
        run: node build.js 

      - name: Asegurar package.json en dist
        # Si el build.js falló al moverlo, esto lo asegura
        run: cp package.json dist/package.json

      - name: Desplegar archivos al servidor
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "dist/*"
          target: "/www/wwwroot/scraper-n8n"
          strip_components: 1
          overwrite: true # Esto sobrescribe los archivos existentes

      - name: Post-Despliegue
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /www/wwwroot/scraper-n8n
            yarn install --production
            # Usamos startOrRestart para que funcione si no existe o si ya existe
            pm2 startOrRestart ecosystem.config.js || pm2 restart scraper-n8n || pm2 start dist/index.js --name "scraper-n8n"
            pm2 save