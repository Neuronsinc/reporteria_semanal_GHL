name: Deploy Scraper n8n

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Instalar dependencias
        run: yarn install --frozen-lockfile

      - name: Ejecutar Build
        run: node build.js 

      - name: Asegurar package.json en dist
        run: cp package.json dist/package.json

      - name: Desplegar TODO al servidor
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          # Subimos TODO el proyecto + la carpeta dist generada
          source: "./*" 
          target: "/www/wwwroot/scraper-n8n"
          overwrite: true

      - name: Post-Despliegue (Instalar y Levantar PM2)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /www/wwwroot/scraper-n8n
            yarn install --production
            # Forzamos a PM2 a usar el archivo de configuración del proyecto
            pm2 startOrRestart ecosystem.config.js
            pm2 save