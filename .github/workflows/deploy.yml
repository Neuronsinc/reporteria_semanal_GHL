name: Deploy Scraper n8n

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Instalar dependencias
        run: yarn install --frozen-lockfile

      - name: Ejecutar Build
        run: node build.js 

      - name: Asegurar package.json en dist
        run: cp package.json dist/package.json

      - name: Preparar archivos (Limpieza Inteligente)
        # Aquí borramos todo lo que NO debe subirse al servidor.
        # Al borrarlos aquí, el paso de SCP ya no los verá y no intentará subirlos.
        run: |
          rm -rf .git
          rm -rf .github
          rm -rf node_modules
          rm -rf .chrome-data
          rm -rf pdf-images
          rm -rf public-reports
          rm -rf reportes
          rm -rf .gitignore
          rm -rf .gitattributes

      - name: Desplegar TODO al servidor
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          # Subimos la raíz completa (que ya está limpia de carpetas pesadas)
          source: "./" 
          target: "/www/wwwroot/scraper-n8n"
          overwrite: true
          strip_components: 0
          tar_tmp_path: "/tmp"

      - name: Post-Despliegue
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /www/wwwroot/scraper-n8n
            # Instalamos dependencias solo de producción
            yarn install --production
            # Creamos las carpetas de trabajo si no existen (sin borrar el contenido que ya hay en el servidor)
            mkdir -p logs reportes public-reports pdf-images .chrome-data
            # Reiniciamos la instancia
            pm2 startOrRestart ecosystem.config.js
            pm2 save