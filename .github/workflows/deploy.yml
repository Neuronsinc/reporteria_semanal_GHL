name: Deploy Scraper n8n

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Instalar dependencias locales
        run: yarn install --frozen-lockfile

      - name: Ejecutar Build (Generar Dist)
        run: node build.js 

      - name: Asegurar package.json en dist
        run: cp package.json dist/package.json

      - name: Preparar paquete de subida
        # Borramos basura de Git y carpetas pesadas antes de subir
        run: |
          rm -rf .git .github node_modules .chrome-data pdf-images public-reports reportes .gitignore .gitattributes

      - name: Desplegar archivos al servidor
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "./" 
          target: "/www/wwwroot/scraper-n8n"
          overwrite: true
          strip_components: 0

      - name: Post-Despliegue (Ejecutar como ROOT)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /www/wwwroot/scraper-n8n
            
            # Cambiar dueño a root para que tú lo veas en tu terminal
            sudo chown -R root:root /www/wwwroot/scraper-n8n
            
            # Instalar dependencias de producción
            sudo yarn install --production
            
            # Asegurar carpetas de trabajo
            sudo mkdir -p logs reportes public-reports pdf-images .chrome-data
            
            # Gestionar PM2 como ROOT
            # Esto NO toca a 'scraper-n8n-DANIA' porque vamos por nombre específico
            sudo pm2 delete scraper-n8n || true
            sudo pm2 start ecosystem.config.js
            sudo pm2 save